<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>داشبورد تحلیل داده</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <script src="libs/tailwind.js"></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
    <script>
      (function () {
        // Default to Light Mode on first visit; respect the saved choice otherwise.
        const dark = localStorage.getItem("theme") === "dark";
        document.documentElement.classList.toggle("dark", dark);
      })();
    </script>
    <script src="libs/papaparse.min.js"></script>
    <script src="libs/xlsx.full.min.js"></script>
    <script src="libs/plotly.min.js"></script>
    <script src="assets/sample-data.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body
    class="min-h-dvh text-sm antialiased bg-[#f4f5f6] dark:bg-[#0e0f11] text-[#1d1f20] dark:text-gray-100"
  >
    <div class="flex flex-col min-h-dvh">
      <header
        class="sticky top-0 z-20 w-full bg-white dark:bg-[#16181b] border-b border-gray-200 dark:border-[#26282c]"
      >
        <div
          class="w-full max-w-[1400px] mx-auto px-5 sm:px-8 h-16 flex items-center justify-between gap-3"
        >
          <div class="flex items-center gap-3 min-w-0">
            <span
              class="shrink-0 inline-flex items-center justify-center w-9 h-9 rounded-lg bg-[#217346]/8"
            >
              <span
                class="material-symbols-outlined text-[32px] text-[#217346]"
                aria-hidden="true"
                >analytics</span
              >
            </span>
            <div class="min-w-0">
              <h1 class="text-base sm:text-lg font-bold leading-tight truncate">
                داشبورد تحلیل داده
              </h1>
            </div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <button
              id="themeToggle"
              type="button"
              aria-label="dark mode"
              class="rounded-lg border border-gray-300 dark:border-[#33363b] bg-white dark:bg-[#1d1f23] hover:border-[#217346] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#217346]/40 transition px-3 py-2 flex items-center gap-2"
            >
              <span
                id="themeIcon"
                class="material-symbols-outlined text-xl"
                aria-hidden="true"
                >dark_mode</span
              >
            </button>
          </div>
        </div>
      </header>

      <main class="flex-1 w-full max-w-[1400px] mx-auto p-5 sm:p-8">
        <!-- Single, centered upload panel — the entire landing experience. -->
        <section
          id="uploadSection"
          class="flex items-center justify-center py-4 sm:py-10"
        >
          <div
            class="upload-card fade-in w-full max-w-[680px] rounded-2xl border border-gray-200 dark:border-[#26282c] bg-white dark:bg-[#16181b] p-6 sm:p-8 text-center"
          >
            <span
              class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-[#217346]/10 mb-3"
            >
              <span
                class="material-symbols-outlined text-[34px] text-[#217346]"
                aria-hidden="true"
                >cloud_upload</span
              >
            </span>
            <p class="text-base font-semibold mb-5">
              فایل Excel یا CSV خود را اینجا رها کنید
            </p>

            <label
              for="fileInput"
              tabindex="0"
              role="button"
              aria-label="انتخاب یا رها کردن فایل برای بارگذاری"
              class="block cursor-pointer rounded-xl border-2 border-dashed border-gray-300 dark:border-[#33363b] hover:border-[#217346] hover:bg-[#217346]/5 focus-visible:outline-none focus-visible:border-[#217346] focus-visible:ring-2 focus-visible:ring-[#217346]/30 transition p-6 sm:p-8"
            >
              <span
                class="inline-flex items-center gap-2 rounded-lg bg-[#217346] hover:bg-[#1a5c38] text-white text-sm font-semibold px-5 py-2.5 transition pointer-events-none"
              >
                <span class="material-symbols-outlined text-base" aria-hidden="true"
                  >upload_file</span
                >
                <span>انتخاب فایل</span>
              </span>
              <div class="text-xs text-gray-400 dark:text-gray-500 mt-3">
                csv · xlsx · xls
              </div>
              <input
                id="fileInput"
                type="file"
                accept=".csv,.xlsx,.xls"
                class="hidden"
              />
            </label>

            <div
              id="fileStatus"
              class="text-xs text-gray-500 dark:text-gray-400 mt-4"
              aria-live="polite"
            >
              فایلی انتخاب نشده است
            </div>

            <div class="upload-divider my-6"><span>یا</span></div>
<!-- 
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">
              مجموعه داده ندارید؟
            </p> -->
            <button
              id="exampleBtn"
              type="button"
              class="inline-flex items-center gap-2 rounded-lg border border-gray-300 dark:border-[#33363b] bg-white dark:bg-[#1d1f23] hover:border-[#217346] hover:text-[#185c37] dark:hover:text-[#33c481] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#217346]/30 text-sm font-semibold px-5 py-2.5 transition"
            >
              <span class="material-symbols-outlined text-base" aria-hidden="true"
                >dataset</span
              >
              <span>استفاده از مجموعه داده نمونه</span>
            </button>
          </div>
        </section>

        <section
          id="resultsSection"
          class="hidden mb-6 rounded-xl border border-gray-200 dark:border-[#26282c] bg-white dark:bg-[#16181b] p-5 sm:p-6"
        >
          <div id="content"></div>
        </section>
      </main>

      <footer
        class="w-full bg-white dark:bg-[#16181b] border-t border-gray-200 dark:border-[#26282c] mt-8"
      >
        <div
          class="w-full max-w-[1400px] mx-auto px-5 sm:px-8 h-14 flex items-center justify-center"
        >
          <p class="text-xs text-gray-500 dark:text-gray-400 text-center">
            داشبورد تحلیل داده • کاملاً در مرورگر شما اجرا می‌شود • بدون نیاز به
            نصب
          </p>
        </div>
      </footer>
    </div>

    <!-- Floating primary action — reveals the upload panel again (same trigger
         that used to live in the toolbar). Shown only while a dataset is loaded;
         the dashboard orchestrator toggles the dock's [hidden]. The outer dock
         provides the frosted-glass halo; the inner button carries the brand. -->
    <div id="fabDock" class="fab-dock" hidden>
      <button
        id="floatingUploadBtn"
        type="button"
        class="fab-upload"
        aria-label="بارگذاری فایل جدید"
        title="بارگذاری فایل جدید"
      >
        <span class="material-symbols-outlined" aria-hidden="true">folder_open</span>
        <span>بارگذاری فایل جدید</span>
      </button>
    </div>

    <!-- App modules — loaded in dependency order (classic scripts, zero-build) -->
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <!-- App.ui augmenters: the single toast + loading systems -->
    <script src="js/dashboard/toast.js"></script>
    <script src="js/dashboard/loading.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/correlation.js"></script>
    <script src="js/insights.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/export.js"></script>
    <!-- Dashboard presentation modules (loaded before the orchestrator) -->
    <script src="js/dashboard/popover.js"></script>
    <script src="js/dashboard/header.js"></script>
    <script src="js/dashboard/summary.js"></script>
    <script src="js/dashboard/preview.js"></script>
    <script src="js/dashboard/toolbar.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
